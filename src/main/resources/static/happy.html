<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Em có yêu anh không?</title>
  <style>
    :root{
      --bg-1: #ffefba;
      --bg-2: #ffdde1;
      --btn-yes: #00d2ff;
      --btn-yes-2: #3a7bd5;
      --btn-no: #ff6b6b;
      --card: rgba(255,255,255,0.95);
      --text: #222;
      --glass: rgba(255,255,255,0.6);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial; background:linear-gradient(135deg,var(--bg-1),var(--bg-2));color:var(--text);-webkit-font-smoothing:antialiased}

    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--card);padding:28px;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,0.12);max-width:920px;width:100%;display:flex;gap:24px;align-items:center;flex-wrap:wrap}

    .left{flex:1 1 360px}
    .right{flex:0 0 240px;text-align:center}

    h1{margin:0 0 8px 0;font-size:clamp(20px,4.6vw,36px);letter-spacing:0.2px}
    p.lead{margin:0 0 18px 0;color:#444}

    .question{font-size:clamp(22px,3.5vw,30px);font-weight:700;margin:16px 0}

    .btn-row{display:flex;gap:16px;align-items:center}
    .btn{border:none;padding:14px 20px;border-radius:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 26px rgba(0,0,0,0.12);transition:transform .15s ease,box-shadow .15s ease}
    .btn:active{transform:translateY(1px)}

    .btn-yes{background:linear-gradient(90deg,var(--btn-yes),var(--btn-yes-2));color:white}
    .btn-no{background:linear-gradient(90deg,#ffd2d2,var(--btn-no));color:white;position:relative}

    /* container where the no button can run around */
    .play-area{position:relative;min-height:120px;display:flex;align-items:center}

    /* modal */
    .modal-backdrop{position:fixed;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:opacity 220ms}
    .modal-backdrop.show{opacity:1;pointer-events:auto}
    .modal{background:linear-gradient(180deg,rgba(255,255,255,0.98),white);padding:24px;border-radius:14px;box-shadow:0 18px 48px rgba(0,0,0,0.28);max-width:90%;text-align:center}
    .modal h2{margin:0 0 8px 0}
    .modal p{margin:0 0 12px 0}
    .close{margin-top:8px}

    /* playful face on the right */
    .face{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff 0,#ffd56b 10%, #ff9a9e 60%);display:inline-block;box-shadow:0 14px 40px rgba(0,0,0,0.12);position:relative;overflow:hidden}
    .eyes{position:absolute;left:50%;top:42%;transform:translateX(-50%);display:flex;gap:18px}
    .eye{width:18px;height:18px;background:#2b2b2b;border-radius:50%}
    .mouth{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);width:70px;height:36px;border-bottom-left-radius:40px;border-bottom-right-radius:40px;background:transparent;box-sizing:border-box;border:6px solid #2b2b2b;border-top:0}

    /* responsive adjustments */
    @media (max-width:640px){
      .card{padding:18px}
      .right{flex-basis:100%;order:3}
      .left{flex-basis:100%;order:1}
      .face{width:120px;height:120px}
      .btn-row{flex-direction:row;gap:12px}
      .play-area{min-height:140px}
    }

    /* toast */
    .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(255,255,255,0.96);padding:12px 18px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);font-weight:700;z-index:70}

    /* subtle confetti */
    .confetti {position:fixed;left:0;top:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:30}
    .confetti i{position:absolute;width:10px;height:14px;background:#f9c74f;opacity:0.95;transform-origin:center;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <div class="left">
        <h1>Em có yêu anh không?</h1>
        <p class="lead">Hãy chọn một trong hai. Nếu em chọn "Có" — anh sẽ trả lời lại bằng lời yêu thương; nếu chọn "Không" thì... đừng lo, nút "Không" sẽ cố gắng chạy đi!</p>

        <div class="question">Em trả lời thế nào?</div>

        <div class="play-area" id="playArea">
          <div class="btn-row">
            <button id="yesBtn" class="btn btn-yes" aria-label="Trả lời Có">Có 💖</button>
            <button id="noBtn" class="btn btn-no" aria-label="Trả lời Không">Không 😅</button>
          </div>
        </div>
      </div>

      <div class="right" aria-hidden="true">
        <div class="face" role="img" aria-label="Biểu tượng vui">
          <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <!-- modal shown when user clicks Có -->
  <div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h2>Anh cũng yêu em 💕</h2>
      <p>Chúc em một ngày thật ngọt ngào và nhiều nụ cười!</p>
      <button id="modalClose" class="btn close">OK</button>
    </div>
  </div>

  <script>
    // Utility: emit simple confetti pieces
    function emitConfetti(count){
      const container = document.getElementById('confetti');
      const colors = ['#ff6b6b','#ffd56b','#6be7ff','#7dffb2','#b58bff'];
      for(let i=0;i<count;i++){
        const el = document.createElement('i');
        el.style.left = Math.random()*100 + '%';
        el.style.top = (-5 - Math.random()*10) + 'vh';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.width = (6 + Math.random()*10) + 'px';
        el.style.height = (8 + Math.random()*12) + 'px';
        el.style.animationDuration = (1.6 + Math.random()*1.8) + 's';
        container.appendChild(el);
        setTimeout(()=>el.remove(), 3800);
      }
    }

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const playArea = document.getElementById('playArea');
    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');

    // Show modal function
    function showModal(){
      modal.classList.add('show');
      modal.setAttribute('aria-hidden','false');
      emitConfetti(30);
    }
    function hideModal(){
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
    }

    yesBtn.addEventListener('click', ()=>{
      showModal();
    });
    modalClose.addEventListener('click', hideModal);

    // Make the No button run away
    function moveNoButtonRandomly(){
      const areaRect = playArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      // Calculate available bounds within playArea
      const padding = 8;
      const maxX = Math.max(0, areaRect.width - btnRect.width - padding);
      const maxY = Math.max(0, areaRect.height - btnRect.height - padding);
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    // On desktop, move on mouseenter to avoid hover-click
    noBtn.addEventListener('mouseenter', (e)=>{
      moveNoButtonRandomly();
    });

    // On click (desktop) or touchstart (mobile), prevent click and move
    noBtn.addEventListener('click', (e)=>{
      e.preventDefault();
      moveNoButtonRandomly();
    });
    noBtn.addEventListener('touchstart', (e)=>{
      e.preventDefault();
      moveNoButtonRandomly();
    }, {passive:false});

    // Ensure the no button stays within the area when window resizes
    window.addEventListener('resize', ()=>{
      // reset transform so we can reposition relative to new size
      noBtn.style.transform = '';
    });

    // Accessibility: allow keyboard users to choose No (move focus to Yes if they try)
    noBtn.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        // move it away and then focus yes button so keyboard users can still interact
        moveNoButtonRandomly();
        yesBtn.focus();
      }
    });

    // Small playful idle animation for yes button
    setInterval(()=>{
      yesBtn.animate([{transform:'translateY(0)'},{transform:'translateY(-6px)'},{transform:'translateY(0)'}],{duration:2000,iterations:1});
    },3600);

    // Small protective logic: if the user manages to actually click No (very fast), show a cheeky toast
    noBtn.addEventListener('dblclick', ()=>{
      showToast('Ôi không! Em thật dũng cảm 😄');
    });

    // Simple toast
    function showToast(text){
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(()=>{ t.style.transition='opacity 300ms'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2200);
    }

    // Make sure the no button initial position is visible and inside play area
    window.addEventListener('load', ()=>{
      // center the buttons row
      noBtn.style.transition = 'transform 260ms ease';
      yesBtn.style.transition = 'transform 160ms ease';
      // small entrance effect
      const row = document.querySelector('.btn-row');
      row.style.opacity = 0; row.style.transform = 'translateY(8px)';
      setTimeout(()=>{ row.style.transition='opacity 300ms, transform 400ms'; row.style.opacity=1; row.style.transform='translateY(0)'; },120);
    });

  </script>
</body>
</html>
